<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hand Gesture Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-8">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center text-blue-400">AI Gesture Recognition Dashboard</h1>
        
        <div class="flex flex-col md:flex-row gap-8">
            <div class="flex-1 bg-gray-800 p-4 rounded-2xl shadow-lg relative">
                <div class="relative w-full aspect-video bg-black rounded-xl overflow-hidden">
                    <video id="webcam" autoplay playsinline class="w-full h-full object-cover transform scale-x-[-1]"></video>
                    <canvas id="output_canvas" class="absolute top-0 left-0 w-full h-full transform scale-x-[-1] pointer-events-none"></canvas>
                </div>
                <button id="enableWebcamButton" class="mt-4 w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-4 rounded-xl transition-colors">
                    เปิดกล้องเพื่อเริ่มทำงาน
                </button>
            </div>

            <div class="w-full md:w-1/3 bg-gray-800 p-6 rounded-2xl shadow-lg flex flex-col justify-center items-center">
                <h2 class="text-xl text-gray-400 mb-4">สถานะปัจจุบัน</h2>
                
                <div id="gestureOutput" class="text-5xl font-extrabold text-green-400 mb-6 h-16 flex items-center justify-center">
                    -
                </div>

                <div class="w-full bg-gray-700 rounded-xl p-4 text-center">
                    <p class="text-sm text-gray-300">ความมั่นใจของ AI (Confidence)</p>
                    <p id="confidenceOutput" class="text-2xl font-bold text-yellow-400">0%</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import {
            GestureRecognizer,
            FilesetResolver
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        let gestureRecognizer;
        let runningMode = "VIDEO";
        let enableWebcamButton = document.getElementById("enableWebcamButton");
        let webcamRunning = false;
        const video = document.getElementById("webcam");
        const gestureOutput = document.getElementById("gestureOutput");
        const confidenceOutput = document.getElementById("confidenceOutput");

        // 1. โหลด AI Model ของ MediaPipe
        const createGestureRecognizer = async () => {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath:
                        "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                    delegate: "GPU"
                },
                runningMode: runningMode
            });
            enableWebcamButton.innerText = "โมเดลพร้อมแล้ว - คลิกเพื่อเปิดกล้อง";
        };
        createGestureRecognizer();

        // 2. ฟังก์ชันเปิดกล้อง
        function enableCam(event) {
            if (!gestureRecognizer) return;

            if (webcamRunning === true) {
                webcamRunning = false;
                enableWebcamButton.innerText = "เปิดกล้องเพื่อเริ่มทำงาน";
            } else {
                webcamRunning = true;
                enableWebcamButton.innerText = "กำลังทำงาน...";
            }

            const constraints = { video: true };
            navigator.mediaDevices.getUserMedia(constraints).then(function (stream) {
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
            });
        }
        enableWebcamButton.addEventListener("click", enableCam);

        let lastVideoTime = -1;

        // 3. ฟังก์ชันประมวลผลเฟรมวิดีโอแบบ Real-time
        async function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                // ส่งภาพให้ AI ทำนาย
                const results = gestureRecognizer.recognizeForVideo(video, Date.now());
                
                // 4. นำผลลัพธ์มาอัปเดต UI
                if (results.gestures.length > 0) {
                    const categoryName = results.gestures[0][0].categoryName;
                    const categoryScore = parseFloat(results.gestures[0][0].score * 100).toFixed(2);
                    
                    // แปลงชื่อท่าทางเบื้องต้น
                    let thaiGesture = categoryName;
                    if(categoryName === "Closed_Fist") thaiGesture = "กำหมัด ✊";
                    else if(categoryName === "Open_Palm") thaiGesture = "แบมือ 🖐️";
                    else if(categoryName === "Pointing_Up") thaiGesture = "ชี้ขึ้น 👆";
                    else if(categoryName === "Thumb_Up") thaiGesture = "เยี่ยม 👍";
                    else if(categoryName === "Thumb_Down") thaiGesture = "แย่ 👎";
                    else if(categoryName === "Victory") thaiGesture = "สู้ๆ ✌️";
                    else if(categoryName === "None") thaiGesture = "ไม่พบท่าทาง";

                    gestureOutput.innerText = thaiGesture;
                    confidenceOutput.innerText = categoryScore + "%";
                } else {
                    gestureOutput.innerText = "-";
                    confidenceOutput.innerText = "0%";
                }
            }
            if (webcamRunning === true) {
                window.requestAnimationFrame(predictWebcam);
            }
        }
    </script>
</body>
</html>
