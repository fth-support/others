<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Real-time Hand Motion Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* CSS เพิ่มเติมเพื่อให้ Video และ Canvas ซ้อนทับกันได้พอดี */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* อัตราส่วน 16:9 */
            background-color: #000;
            border-radius: 1rem;
            overflow: hidden;
        }
        #webcam, #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* กลับด้านภาพให้เหมือนกระจก */
        }
        #output_canvas {
            pointer-events: none; /* ให้คลิกทะลุ Canvas ไปโดน Video ได้ */
            z-index: 10; /* ให้ Canvas อยู่ด้านบนสุด */
        }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen p-4 md:p-8 font-sans bg-gradient-to-br from-gray-900 to-black">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 flex items-center justify-center gap-3">
                <span class="material-icons text-4xl">back_hand</span>
                AI Real-time Hand Motion Monitor
            </h1>
            <p class="text-gray-400 mt-2">ตรวจจับท่าทางและการเคลื่อนไหวของมือแบบเรียลไทม์</p>
        </header>
        
        <div class="flex flex-col lg:flex-row gap-6">
            <div class="flex-1">
                <div class="video-container shadow-2xl border-2 border-gray-800/50 glow-border">
                    <video id="webcam" autoplay playsinline></video>
                    <canvas id="output_canvas"></canvas>
                </div>
                <button id="enableWebcamButton" class="mt-6 w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-4 px-6 rounded-xl transition-all duration-300 transform hover:scale-[1.02] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 flex items-center justify-center gap-2 shadow-lg">
                    <span class="material-icons animate-spin hidden" id="loadingIcon">sync</span>
                    <span id="buttonText">กำลังโหลด AI Model...</span>
                </button>
            </div>

            <div class="w-full lg:w-1/3 space-y-6">
                <div class="bg-gray-900/80 backdrop-blur-sm p-6 rounded-2xl shadow-xl border border-gray-800/50">
                    <h2 class="text-xl font-semibold text-cyan-400 mb-6 flex items-center gap-2 border-b border-gray-800 pb-3">
                        <span class="material-icons">stacked_line_chart</span>
                        Real-time Monitor
                    </h2>
                    
                    <div class="bg-gray-800/50 rounded-xl p-6 text-center mb-4 shadow-inner border border-gray-700/30">
                        <p class="text-sm text-gray-400 mb-2 uppercase tracking-wider flex items-center justify-center gap-1">
                            <span class="material-icons text-base">swap_horiz</span>
                            Motion Detection
                        </p>
                        <div id="swipeOutputContainer" class="h-16 flex items-center justify-center overflow-hidden">
                            <p id="swipeOutput" class="text-4xl font-black text-white transition-all duration-300 transform">-</p>
                        </div>
                    </div>

                    <div class="bg-gray-800/50 rounded-xl p-6 text-center shadow-inner border border-gray-700/30">
                        <p class="text-sm text-gray-400 mb-2 uppercase tracking-wider flex items-center justify-center gap-1">
                            <span class="material-icons text-base">fingerprint</span>
                            Hand Gesture
                        </p>
                        <div class="h-12 flex items-center justify-center">
                             <p id="gestureOutput" class="text-3xl font-bold text-green-400 transition-all duration-300">-</p>
                        </div>
                        <p id="confidenceOutput" class="text-xs text-gray-500 mt-2">Confidence: 0%</p>
                    </div>
                </div>
                
                <div class="bg-gray-900/80 backdrop-blur-sm p-4 rounded-xl shadow text-center border border-gray-800/50">
                    <p class="text-gray-400 text-sm flex items-center justify-center gap-2">
                        <span class="relative flex h-3 w-3">
                          <span id="statusDotPing" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                          <span id="statusDot" class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                        </span>
                        System Status: <span id="systemStatus" class="text-red-400 font-medium">Offline</span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // นำเข้า Library ของ MediaPipe และฟังก์ชันวาดภาพ
        import {
            GestureRecognizer,
            FilesetResolver,
            DrawingUtils
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        // ประกาศตัวแปรหลัก
        let gestureRecognizer;
        let runningMode = "VIDEO";
        let enableWebcamButton = document.getElementById("enableWebcamButton");
        let buttonText = document.getElementById("buttonText");
        let loadingIcon = document.getElementById("loadingIcon");
        let webcamRunning = false;
        
        // ตัวแปรสำหรับ Elements ต่างๆ ในหน้าเว็บ
        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const gestureOutput = document.getElementById("gestureOutput");
        const confidenceOutput = document.getElementById("confidenceOutput");
        const swipeOutput = document.getElementById("swipeOutput");
        const swipeOutputContainer = document.getElementById("swipeOutputContainer");
        const systemStatus = document.getElementById("systemStatus");
        const statusDot = document.getElementById("statusDot");
        const statusDotPing = document.getElementById("statusDotPing");

        // ตัวแปรสำหรับ Logic การ Swipe
        let previousX = null;
        let swipeTimer = null;
        let drawingUtils; // ตัวช่วยวาดภาพของ MediaPipe

        // --- ฟังก์ชัน 1: เริ่มต้นโหลด AI Model ---
        const createGestureRecognizer = async () => {
            try {
                // โหลดไฟล์ WASM ที่จำเป็น
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                // สร้าง GestureRecognizer จากโมเดลที่โฮสต์ไว้
                gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                        delegate: "GPU" // ใช้ GPU ประมวลผลเพื่อความลื่นไหล
                    },
                    runningMode: runningMode,
                    numHands: 1 // ตรวจจับทีละ 1 มือ
                });
                
                // อัปเดตสถานะปุ่มเมื่อโมเดลพร้อม
                buttonText.innerText = "คลิกเพื่อเปิดกล้องเริ่มใช้งาน";
                loadingIcon.classList.add('hidden');
                enableWebcamButton.disabled = false;
                
                // สร้าง DrawingUtils สำหรับวาดบน Canvas
                drawingUtils = new DrawingUtils(canvasCtx);
            } catch (error) {
                console.error("Error loading model:", error);
                buttonText.innerText = "เกิดข้อผิดพลาดในการโหลดโมเดล";
            }
        };
        
        // เริ่มโหลดโมเดลทันทีที่เปิดเว็บ
        enableWebcamButton.disabled = true;
        loadingIcon.classList.remove('hidden');
        createGestureRecognizer();

        // --- ฟังก์ชัน 2: ควบคุมการเปิด/ปิดกล้อง ---
        function enableCam(event) {
            if (!gestureRecognizer) return;

            if (webcamRunning === true) {
                // ปิดกล้อง
                webcamRunning = false;
                buttonText.innerText = "คลิกเพื่อเปิดกล้องเริ่มใช้งาน";
                enableWebcamButton.classList.remove('from-red-600', 'to-pink-600', 'hover:from-red-500', 'hover:to-pink-500');
                enableWebcamButton.classList.add('from-cyan-600', 'to-blue-600', 'hover:from-cyan-500', 'hover:to-blue-500');
                
                // หยุด Stream และเคลียร์ Video/Canvas
                const stream = video.srcObject;
                if (stream) {
                    const tracks = stream.getTracks();
                    tracks.forEach(track => track.stop());
                }
                video.srcObject = null;
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                
                // อัปเดตสถานะระบบ
                systemStatus.innerText = "Offline";
                systemStatus.classList.replace('text-green-400', 'text-red-400');
                statusDot.classList.replace('bg-green-500', 'bg-red-500');
                statusDotPing.classList.replace('bg-green-400', 'bg-red-400');

            } else {
                // เปิดกล้อง
                webcamRunning = true;
                buttonText.innerText = "ปิดกล้อง";
                enableWebcamButton.classList.remove('from-cyan-600', 'to-blue-600', 'hover:from-cyan-500', 'hover:to-blue-500');
                enableWebcamButton.classList.add('from-red-600', 'to-pink-600', 'hover:from-red-500', 'hover:to-pink-500');

                // ขอสิทธิ์เข้าถึงกล้อง
                const constraints = { video: { width: 1280, height: 720 } }; // ขอความละเอียด HD
                navigator.mediaDevices.getUserMedia(constraints)
                    .then(function (stream) {
                        video.srcObject = stream;
                        // เมื่อภาพจากกล้องมาแล้ว ให้เริ่ม loop ประมวลผล
                        video.addEventListener("loadeddata", predictWebcam);
                        
                        // อัปเดตสถานะระบบ
                        systemStatus.innerText = "Online & Tracking";
                        systemStatus.classList.replace('text-red-400', 'text-green-400');
                        statusDot.classList.replace('bg-red-500', 'bg-green-500');
                        statusDotPing.classList.replace('bg-red-400', 'bg-green-400');
                    })
                    .catch((err) => {
                        console.error("Error accessing webcam:", err);
                        buttonText.innerText = "ไม่สามารถเข้าถึงกล้องได้";
                        webcamRunning = false;
                    });
            }
        }
        enableWebcamButton.addEventListener("click", enableCam);

        let lastVideoTime = -1;

        // --- ฟังก์ชัน 3: Loop ประมวลผลภาพและวาดผลลัพธ์ (หัวใจหลัก) ---
        async function predictWebcam() {
            // ปรับขนาด Canvas ให้ตรงกับ Video เพื่อให้วาดได้ตรงตำแหน่ง
            canvasElement.width = video.videoWidth;
            canvasElement.height = video.videoHeight;

            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                
                // ส่งภาพปัจจุบันไปให้ AI ประมวลผล
                const results = gestureRecognizer.recognizeForVideo(video, Date.now());
                
                // เคลียร์ Canvas ก่อนวาดเฟรมใหม่
                canvasCtx.save();
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                
                // === ส่วนที่ 3.1: วาดโครงกระดูกมือ (Skeleton Extraction) ===
                if (results.landmarks) {
                    for (const landmarks of results.landmarks) {
                        // ใช้ drawingUtils วาดเส้นเชื่อมจุดต่างๆ ของมือ
                        drawingUtils.drawConnectors(
                            landmarks,
                            GestureRecognizer.HAND_CONNECTIONS,
                            { color: "#00FF00", lineWidth: 3 } // เส้นสีเขียวสด
                        );
                        // ใช้ drawingUtils วาดจุดข้อต่อต่างๆ
                        drawingUtils.drawLandmarks(landmarks, {
                            color: "#FF0000", // จุดสีแดง
                            lineWidth: 2,
                            radius: 3 // ขนาดจุด
                        });
                    }
                }
                canvasCtx.restore();
                
                // === ส่วนที่ 3.2: จัดการผลลัพธ์ท่าทาง (Gesture Recognition) ===
                if (results.gestures.length > 0) {
                    const categoryName = results.gestures[0][0].categoryName;
                    const confidence = Math.round(parseFloat(results.gestures[0][0].score) * 100);
                    
                    let thaiGesture = categoryName;
                    let gestureColor = "text-green-400";
                    
                    // แปลงชื่อท่าทางเป็นภาษาไทย
                    switch(categoryName) {
                        case "Closed_Fist": thaiGesture = "กำหมัด ✊"; break;
                        case "Open_Palm": thaiGesture = "แบมือ 🖐️"; break;
                        case "Pointing_Up": thaiGesture = "ชี้ขึ้น 👆"; break;
                        case "Thumb_Up": thaiGesture = "เยี่ยม 👍"; break;
                        case "Thumb_Down": thaiGesture = "แย่ 👎"; gestureColor = "text-red-400"; break;
                        case "Victory": thaiGesture = "สู้ๆ ✌️"; break;
                        case "ILoveYou": thaiGesture = "เลิฟยู 🤟"; break;
                        case "None": thaiGesture = "ปกติ"; gestureColor = "text-gray-400"; break;
                    }

                    gestureOutput.innerText = thaiGesture;
                    gestureOutput.className = `text-3xl font-bold transition-all duration-300 ${gestureColor}`;
                    confidenceOutput.innerText = `Confidence: ${confidence}%`;
                } else {
                    gestureOutput.innerText = "-";
                    gestureOutput.className = "text-3xl font-bold text-gray-500 transition-all duration-300";
                    confidenceOutput.innerText = "Confidence: 0%";
                }

                // === ส่วนที่ 3.3: จัดการผลลัพธ์การเคลื่อนที่ (Motion/Swipe Detection) ===
                if (results.landmarks && results.landmarks.length > 0) {
                    // ใช้พิกัดแกน X ของจุดที่ 0 (ข้อมือ)
                    const currentX = results.landmarks[0][0].x; 
                    
                    if (previousX !== null) {
                        const deltaX = currentX - previousX;
                        const swipeThreshold = 0.05; // ค่าความไวในการปัด (ยิ่งน้อยยิ่งไว)

                        if (deltaX > swipeThreshold) {
                            // ปัดซ้าย (ภาพ Mirror: ค่า X เพิ่มขึ้น = ไปทางซ้ายของจอ)
                            showSwipeResult("ปัดซ้าย ⬅️", "text-cyan-400", "translate-x-[-10px]");
                        } else if (deltaX < -swipeThreshold) {
                            // ปัดขวา (ภาพ Mirror: ค่า X ลดลง = ไปทางขวาของจอ)
                            showSwipeResult("ปัดขวา ➡️", "text-blue-400", "translate-x-[10px]");
                        }
                    }
                    previousX = currentX;
                } else {
                    previousX = null;
                }
            }
            
            // เรียกตัวเองซ้ำเพื่อประมวลผลเฟรมถัดไป
            if (webcamRunning === true) {
                window.requestAnimationFrame(predictWebcam);
            }
        }

        // ฟังก์ชันช่วยแสดงผลการปัดมือและรีเซ็ตอัตโนมัติ
        function showSwipeResult(text, colorClass, translateClass) {
            swipeOutput.innerText = text;
            swipeOutput.className = `text-4xl font-black transition-all duration-300 transform ${colorClass} ${translateClass}`;
            
            clearTimeout(swipeTimer);
            swipeTimer = setTimeout(() => {
                swipeOutput.innerText = "-";
                swipeOutput.className = "text-4xl font-black text-gray-500 transition-all duration-300 transform translate-x-0";
            }, 800); // แสดงผลค้างไว้ 0.8 วินาที
        }
    </script>
    
    <style>
        .glow-border {
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.3), inset 0 0 15px rgba(6, 182, 212, 0.1);
            transition: box-shadow 0.3s ease;
        }
        .video-container:hover .glow-border {
             box-shadow: 0 0 25px rgba(6, 182, 212, 0.5), inset 0 0 20px rgba(6, 182, 212, 0.2);
        }
    </style>
</body>
</html>
