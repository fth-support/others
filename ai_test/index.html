<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hand Swipe Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-8 font-sans">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center text-cyan-400">AI Motion & Gesture Monitor</h1>
        
        <div class="flex flex-col md:flex-row gap-6">
            <div class="flex-1 bg-gray-800 p-4 rounded-2xl shadow-xl border border-gray-700">
                <div class="relative w-full aspect-video bg-black rounded-xl overflow-hidden shadow-inner">
                    <video id="webcam" autoplay playsinline class="w-full h-full object-cover transform scale-x-[-1]"></video>
                </div>
                <button id="enableWebcamButton" class="mt-6 w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 px-4 rounded-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                    กำลังโหลด AI Model...
                </button>
            </div>

            <div class="w-full md:w-1/3 bg-gray-800 p-6 rounded-2xl shadow-xl border border-gray-700 flex flex-col justify-start">
                <h2 class="text-lg text-gray-400 mb-6 border-b border-gray-600 pb-2">Real-time Monitor</h2>
                
                <div class="bg-gray-700 rounded-xl p-6 text-center mb-4 shadow-inner">
                    <p class="text-sm text-gray-300 mb-2">การเคลื่อนไหว (Motion)</p>
                    <p id="swipeOutput" class="text-4xl font-extrabold text-cyan-400 transition-all duration-300">-</p>
                </div>

                <div class="bg-gray-700 rounded-xl p-6 text-center shadow-inner">
                    <p class="text-sm text-gray-300 mb-2">ท่าทางมือ (Gesture)</p>
                    <p id="gestureOutput" class="text-3xl font-bold text-green-400">-</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import {
            GestureRecognizer,
            FilesetResolver
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        let gestureRecognizer;
        let runningMode = "VIDEO";
        let enableWebcamButton = document.getElementById("enableWebcamButton");
        let webcamRunning = false;
        
        const video = document.getElementById("webcam");
        const gestureOutput = document.getElementById("gestureOutput");
        const swipeOutput = document.getElementById("swipeOutput");

        // ตัวแปรสำหรับคำนวณการ Swipe
        let previousX = null;
        let swipeTimer = null;

        // 1. โหลด AI Model จาก CDN
        const createGestureRecognizer = async () => {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                    delegate: "GPU"
                },
                runningMode: runningMode
            });
            enableWebcamButton.innerText = "โมเดลพร้อมแล้ว - คลิกเพื่อเปิดกล้อง";
            enableWebcamButton.disabled = false;
        };
        
        enableWebcamButton.disabled = true;
        createGestureRecognizer();

        // 2. ฟังก์ชันเปิดกล้อง
        function enableCam(event) {
            if (!gestureRecognizer) return;

            if (webcamRunning === true) {
                webcamRunning = false;
                enableWebcamButton.innerText = "เปิดกล้องเพื่อเริ่มทำงาน";
                enableWebcamButton.classList.replace('bg-red-600', 'bg-cyan-600');
            } else {
                webcamRunning = true;
                enableWebcamButton.innerText = "ปิดกล้อง";
                enableWebcamButton.classList.replace('bg-cyan-600', 'bg-red-600');
            }

            const constraints = { video: true };
            navigator.mediaDevices.getUserMedia(constraints).then(function (stream) {
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
            });
        }
        enableWebcamButton.addEventListener("click", enableCam);

        let lastVideoTime = -1;

        // 3. ฟังก์ชันประมวลผล AI
        async function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                
                // สั่งให้ AI ตรวจจับมือ
                const results = gestureRecognizer.recognizeForVideo(video, Date.now());
                
                // ----- จัดการ Gesture (ท่าทาง) -----
                if (results.gestures.length > 0) {
                    const categoryName = results.gestures[0][0].categoryName;
                    let thaiGesture = categoryName;
                    if(categoryName === "Closed_Fist") thaiGesture = "กำหมัด ✊";
                    else if(categoryName === "Open_Palm") thaiGesture = "แบมือ 🖐️";
                    else if(categoryName === "Pointing_Up") thaiGesture = "ชี้ขึ้น 👆";
                    else if(categoryName === "Thumb_Up") thaiGesture = "เยี่ยม 👍";
                    else if(categoryName === "Thumb_Down") thaiGesture = "แย่ 👎";
                    else if(categoryName === "Victory") thaiGesture = "สู้ๆ ✌️";
                    else if(categoryName === "None") thaiGesture = "ปกติ";

                    gestureOutput.innerText = thaiGesture;
                } else {
                    gestureOutput.innerText = "-";
                }

                // ----- จัดการ Swipe (ปัดซ้าย-ขวา) -----
                if (results.landmarks && results.landmarks.length > 0) {
                    // ดึงตำแหน่งแกน X ของข้อมือ (จุดที่ 0)
                    // หมายเหตุ: ภาพโดนกลับซ้ายขวา (Mirror) ค่า x จึงกลับด้านด้วย
                    const currentX = results.landmarks[0][0].x; 
                    
                    if (previousX !== null) {
                        const deltaX = currentX - previousX;
                        
                        // ถ้าขยับแกน X เกินค่าที่ตั้งไว้ (Threshold)
                        if (deltaX > 0.04) {
                            swipeOutput.innerText = "ปัดซ้าย ⬅️";
                            clearTimeout(swipeTimer);
                            swipeTimer = setTimeout(() => swipeOutput.innerText = "-", 1000); // รีเซ็ตหลัง 1 วินาที
                        } else if (deltaX < -0.04) {
                            swipeOutput.innerText = "ปัดขวา ➡️";
                            clearTimeout(swipeTimer);
                            swipeTimer = setTimeout(() => swipeOutput.innerText = "-", 1000);
                        }
                    }
                    previousX = currentX;
                } else {
                    previousX = null;
                }
            }
            if (webcamRunning === true) {
                window.requestAnimationFrame(predictWebcam);
            }
        }
    </script>
</body>
</html>
