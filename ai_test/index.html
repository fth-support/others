<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Retail Anti-Theft System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background-color: #000;
            border-radius: 1rem;
            overflow: hidden;
        }
        #webcam, #output_canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            /* ไม่กลับด้านภาพ (Mirror) เพื่อให้เห็นสินค้าถูกต้อง */
        }
        #output_canvas { pointer-events: none; z-index: 10; }
        
        /* Animation แสงวาบเมื่อเจอ Fraud */
        @keyframes redFlash {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.8; background-color: red; }
        }
        .animate-alarm {
            animation: redFlash 0.5s infinite;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 40; pointer-events: none; display: none;
        }

        /* Modal Lock Screen */
        #lockScreen {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 50;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        /* Log Styling */
        .log-entry { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen p-4 font-sans">

    <div id="flashOverlay" class="animate-alarm"></div>

    <div id="lockScreen">
        <span class="material-icons text-9xl text-red-600 mb-4 animate-pulse">gpp_bad</span>
        <h1 class="text-5xl font-bold text-red-500 mb-2">SECURITY ALERT</h1>
        <p class="text-2xl text-white mb-8">ตรวจพบพฤติกรรมน่าสงสัย (No Product Detected)</p>
        <button onclick="unlockSystem()" class="bg-red-600 hover:bg-red-700 text-white text-xl font-bold py-4 px-12 rounded-full shadow-lg transform hover:scale-105 transition-all border-4 border-red-800">
            ADMIN UNLOCK (กดเพื่อปลดล็อก)
        </button>
    </div>

    <div class="max-w-7xl mx-auto">
        <header class="mb-6 flex justify-between items-center bg-gray-900 p-4 rounded-xl border border-gray-800">
            <div class="flex items-center gap-3">
                <span class="material-icons text-4xl text-cyan-400">storefront</span>
                <div>
                    <h1 class="text-2xl font-bold text-white">Retail AI Guard</h1>
                    <p class="text-gray-400 text-sm">ระบบป้องกันการขโมยสินค้าอัจฉริยะ</p>
                </div>
            </div>
            <div class="text-right">
                <div id="systemStatus" class="text-red-500 font-bold flex items-center justify-end gap-2">
                    <span class="w-3 h-3 rounded-full bg-red-500"></span> OFFLINE
                </div>
            </div>
        </header>
        
        <div class="flex flex-col lg:flex-row gap-6">
            <div class="flex-[2]">
                <div class="video-container shadow-2xl border-4 border-gray-800" id="videoBorder">
                    <video id="webcam" autoplay playsinline></video>
                    <canvas id="output_canvas"></canvas>
                    
                    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-3/4 h-3/4 border-2 border-dashed border-cyan-500/30 rounded-lg pointer-events-none flex items-center justify-center">
                        <span class="text-cyan-500/30 font-bold text-4xl tracking-widest uppercase">Scan Zone</span>
                    </div>
                </div>
                
                <button id="enableWebcamButton" class="mt-4 w-full bg-cyan-700 hover:bg-cyan-600 text-white font-bold py-4 rounded-xl transition-all shadow-lg flex justify-center items-center gap-2">
                    <span class="material-icons">videocam</span> <span id="btnText">โหลดระบบ AI...</span>
                </button>
            </div>

            <div class="flex-1 flex flex-col gap-4">
                <div class="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl">
                    <h2 class="text-gray-400 text-sm uppercase mb-2">Detected Object (สินค้าที่พบ)</h2>
                    <div id="detectedItemBox" class="text-4xl font-bold text-white h-16 flex items-center overflow-hidden text-cyan-400">
                        -
                    </div>
                </div>

                <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 shadow-xl flex-1 flex flex-col h-[400px]">
                    <div class="flex justify-between items-center mb-4 border-b border-gray-800 pb-2">
                        <h2 class="font-bold text-gray-300 flex items-center gap-2">
                            <span class="material-icons text-sm">receipt</span> Transaction Log
                        </h2>
                        <button onclick="clearLogs()" class="text-xs text-gray-500 hover:text-white">Clear</button>
                    </div>
                    <div id="logContainer" class="flex-1 overflow-y-auto space-y-2 pr-2 font-mono text-sm">
                        <div class="text-center text-gray-600 mt-10">Waiting for activity...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { ObjectDetector, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.2";

        // Configuration
        const PRODUCT_WHITELIST = ['bottle', 'wine glass', 'cup', 'fork', 'knife', 'spoon', 'bowl', 'banana', 'apple', 'sandwich', 'orange', 'broccoli', 'carrot', 'hot dog', 'pizza', 'donut', 'cake', 'chair', 'couch', 'potted plant', 'bed', 'dining table', 'toilet', 'tv', 'laptop', 'mouse', 'remote', 'keyboard', 'cell phone', 'microwave', 'oven', 'toaster', 'sink', 'refrigerator', 'book', 'clock', 'vase', 'scissors', 'teddy bear', 'hair drier', 'toothbrush'];
        
        let objectDetector;
        let runningMode = "VIDEO";
        let webcamRunning = false;
        let isSystemLocked = false;
        
        // DOM Elements
        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output_canvas");
        const ctx = canvas.getContext("2d");
        const btn = document.getElementById("enableWebcamButton");
        const logContainer = document.getElementById("logContainer");
        const detectedItemBox = document.getElementById("detectedItemBox");
        const flashOverlay = document.getElementById("flashOverlay");
        const lockScreen = document.getElementById("lockScreen");
        const videoBorder = document.getElementById("videoBorder");
        
        // Motion Logic Variables
        let previousX = null;
        let lastScanTime = 0;
        let audioCtx = null; // For Siren

        // 1. Load AI Model (Object Detection)
        const setupAI = async () => {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.2/wasm");
            objectDetector = await ObjectDetector.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite",
                    delegate: "GPU"
                },
                scoreThreshold: 0.45, // ความมั่นใจ 45% ขึ้นไปถึงจะนับ
                runningMode: runningMode
            });
            document.getElementById("btnText").innerText = "START SYSTEM / เปิดกล้อง";
            btn.disabled = false;
        };
        setupAI();

        // 2. Audio System (Siren Generator)
        function playSiren() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            oscillator.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            oscillator.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.2);
            
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5);
        }

        // 3. Fraud Trigger Logic
        function triggerFraudAlert() {
            if (isSystemLocked) return;
            isSystemLocked = true;
            
            // UI Effects
            flashOverlay.style.display = 'block';
            lockScreen.style.display = 'flex';
            videoBorder.classList.replace('border-gray-800', 'border-red-600');
            
            // Log
            addLog("FRAUD DETECTED", "Suspicious movement without product!", "text-red-500", "bg-red-900/30");
            
            // Sound Loop
            const sirenInterval = setInterval(playSiren, 500);
            window.currentSiren = sirenInterval;
        }

        window.unlockSystem = function() {
            isSystemLocked = false;
            flashOverlay.style.display = 'none';
            lockScreen.style.display = 'none';
            videoBorder.classList.replace('border-red-600', 'border-gray-800');
            clearInterval(window.currentSiren);
            addLog("SYSTEM", "Unlocked by Admin", "text-green-400");
        };

        // 4. Main Processing Loop
        let lastVideoTime = -1;
        async function predictWebcam() {
            if (isSystemLocked) {
                // ถ้าล็อคอยู่ ให้หยุด process แต่ยัง loop
                if (webcamRunning) window.requestAnimationFrame(predictWebcam);
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const detections = objectDetector.detectForVideo(video, Date.now()).detections;
                
                displayDetections(detections); // วาดกรอบ
                analyzeBehavior(detections);   // วิเคราะห์ Fraud/Scan
            }

            if (webcamRunning) window.requestAnimationFrame(predictWebcam);
        }

        // 5. Logic การวาดและวิเคราะห์
        function displayDetections(detections) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            detections.forEach(detection => {
                const { originX, originY, width, height } = detection.boundingBox;
                const category = detection.categories[0];
                const isProduct = PRODUCT_WHITELIST.includes(category.categoryName);
                
                // Color Coding
                const color = isProduct ? "#00FF00" : (category.categoryName === "person" ? "#FFA500" : "#CCCCCC");

                ctx.strokeStyle = color;
                ctx.lineWidth = 4;
                ctx.strokeRect(originX, originY, width, height);

                ctx.fillStyle = color;
                ctx.font = "20px Arial";
                ctx.fillText(`${category.categoryName} ${Math.round(category.score * 100)}%`, originX, originY - 10);
            });
        }

        function analyzeBehavior(detections) {
            // หาวัตถุหลักในภาพ (ที่ใหญ่ที่สุด)
            if (detections.length === 0) {
                previousX = null;
                detectedItemBox.innerText = "-";
                return;
            }

            // แยกประเภทวัตถุ
            const products = detections.filter(d => PRODUCT_WHITELIST.includes(d.categories[0].categoryName));
            const persons = detections.filter(d => d.categories[0].categoryName === "person");
            
            // แสดงชื่อสินค้าที่เจอบนจอ
            if (products.length > 0) {
                detectedItemBox.innerText = products.map(p => p.categories[0].categoryName).join(", ");
                detectedItemBox.className = "text-4xl font-bold h-16 flex items-center overflow-hidden text-green-400";
            } else {
                detectedItemBox.innerText = persons.length > 0 ? "Detecting Hand/Arm..." : "-";
                detectedItemBox.className = "text-4xl font-bold h-16 flex items-center overflow-hidden text-gray-500";
            }

            // คำนวณการเคลื่อนไหว (Motion) จากวัตถุที่ใหญ่ที่สุด
            // เราใช้กล้องเล็งที่เคาน์เตอร์ ดังนั้นอะไรที่ขยับคือสิ่งที่กำลังสแกน
            const primaryObject = products.length > 0 ? products[0] : persons[0]; 
            
            if (!primaryObject) return;

            const currentX = primaryObject.boundingBox.originX;
            
            if (previousX !== null) {
                const deltaX = Math.abs(currentX - previousX);
                const motionThreshold = 15; // ความไวในการขยับ (pixel)

                // ถ้ามีการขยับอย่างมีนัยสำคัญ
                if (deltaX > motionThreshold) {
                    const now = Date.now();
                    if (now - lastScanTime > 1500) { // Cooldown 1.5 วินาที
                        
                        if (products.length > 0) {
                            // CASE 1: ขยับ + เจอสินค้า = ผ่าน
                            addLog("SCAN SUCCESS", `Scanned: ${products[0].categories[0].categoryName}`, "text-green-400", "bg-green-900/20");
                            lastScanTime = now;
                        } else if (persons.length > 0) {
                            // CASE 2: ขยับ + เจอแต่คน (ไม่มีสินค้า) = โกง!
                            // กรอง False Positive: ต้องขยับเร็วระดับนึงถึงจะ trigger
                            if (deltaX > 25) { 
                                triggerFraudAlert();
                            }
                        }
                    }
                }
            }
            previousX = currentX;
        }

        // Utilities
        function enableCam() {
            if (!objectDetector) return;
            webcamRunning = !webcamRunning;
            
            const statusDiv = document.getElementById("systemStatus");
            
            if (webcamRunning) {
                btn.classList.replace("bg-cyan-700", "bg-red-700");
                document.getElementById("btnText").innerText = "STOP SYSTEM";
                statusDiv.innerHTML = '<span class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></span> ONLINE';
                statusDiv.className = "text-green-500 font-bold flex items-center justify-end gap-2";
                
                navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } }).then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener("loadeddata", predictWebcam);
                    addLog("SYSTEM", "Camera Started. Security Active.", "text-cyan-400");
                });
            } else {
                btn.classList.replace("bg-red-700", "bg-cyan-700");
                document.getElementById("btnText").innerText = "START SYSTEM";
                statusDiv.innerHTML = '<span class="w-3 h-3 rounded-full bg-red-500"></span> OFFLINE';
                statusDiv.className = "text-red-500 font-bold flex items-center justify-end gap-2";
                
                video.srcObject.getTracks().forEach(track => track.stop());
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                addLog("SYSTEM", "System Shutdown.", "text-gray-500");
            }
        }
        btn.addEventListener("click", enableCam);

        function addLog(type, message, colorClass, bgClass = "") {
            const time = new Date().toLocaleTimeString('th-TH', { hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit' });
            const div = document.createElement("div");
            div.className = `log-entry flex justify-between p-2 rounded border-l-4 border-gray-600 ${bgClass} hover:bg-gray-800 transition-colors`;
            div.innerHTML = `
                <div class="flex gap-3">
                    <span class="text-gray-500 font-mono">[${time}]</span>
                    <span class="${colorClass} font-bold">${type}</span>
                </div>
                <span class="text-gray-300 truncate w-1/2 text-right">${message}</span>
            `;
            logContainer.prepend(div);
            if (logContainer.children.length > 50) logContainer.lastChild.remove();
        }
        
        window.clearLogs = () => { logContainer.innerHTML = ''; };
    </script>
</body>
</html>
